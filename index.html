<!-- index.html -->
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAV Editor</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; background: #f0f0f0; }
  h1 { text-align: center; }
  #fileInput { margin-bottom: 20px; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
  th { background: #eee; }
  input[type="text"] { width: 100%; box-sizing: border-box; }
</style>
</head>
<body>

<h1>SAV Editor</h1>
<input type="file" id="fileInput" accept=".sav,.txt">
<table id="savTable">
  <thead>
    <tr>
      <th>Ayar</th>
      <th>Değer</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const fileInput = document.getElementById('fileInput');
const tableBody = document.querySelector('#savTable tbody');

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (ev) => {
    const text = ev.target.result;
    parseSAV(text);
  };
  reader.readAsText(file);
});

function parseSAV(text) {
  tableBody.innerHTML = ''; // eski veriyi temizle
  // Her satırı ayır
  const lines = text.split(/[\r\n]+/).filter(Boolean);

  lines.forEach(line => {
    // Ayır: key ve value
    const match = line.match(/^(.+?)\s*➤?\s*(.+)$/);
    if (!match) return;
    const key = match[1].trim();
    const value = match[2].trim();

    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${key}</td>
      <td><input type="text" value="${value}"></td>
    `;
    tableBody.appendChild(row);
  });
}
</script>

</body>
</html>
